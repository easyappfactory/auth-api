# prod — 운영 (RDS SSL, DDL validate, 쿠키 Strict)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    org.hibernate.SQL: error
    org.springframework.orm.jpa: info

app:
  cookie:
    domain: ${APP_COOKIE_DOMAIN}
    secure: true
    same-site: Strict
