# local — 로컬 개발 (DDL update, SQL 디버그, 쿠키 완화)
spring:
  config:
    activate:
      on-profile: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        use_sql_comments: true

  h2:
    console:
      enabled: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.orm.jpa: debug

app:
  cookie:
    secure: false
    same-site: Lax
